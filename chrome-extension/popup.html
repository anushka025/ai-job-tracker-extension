<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .logo {
      font-size: 32px;
    }
    
    h1 {
      margin: 0;
      font-size: 24px;
      color: #10b981;
    }
    
    p {
      color: #666;
      margin: 0 0 20px 0;
      font-size: 14px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .primary {
      background: #10b981;
      color: white;
    }
    
    .primary:hover {
      background: #059669;
    }
    
    .secondary {
      background: #6b7280;
      color: white;
    }
    
    .secondary:hover {
      background: #4b5563;
    }
    
    .warning {
      background: #fef3c7;
      color: #92400e;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📝</div>
    <h1>JobTracker Pro</h1>
  </div>
  
  <p>Save LinkedIn jobs with one click!</p>
  
  <button class="primary" id="dashboardBtn">Open Dashboard</button>
  <button class="secondary" id="loginBtn">Log In</button>
  
  <div class="warning" id="authWarning" style="display: none;">
    <span>⚠️</span>
    <span>Please log in first</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
